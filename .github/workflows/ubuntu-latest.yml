name: ubuntu-latest

on:
  push:
    branches: 
    - main
    - dev0.0.1
  pull_request:
    branches:
    - main
    - dev0.0.1

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose --no-fail-fast --all-targets -- --include-ignored
